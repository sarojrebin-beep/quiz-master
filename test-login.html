<!DOCTYPE html>
<html>
<head><title>Login Test</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#0f0;">
<h2>Supabase Login Test</h2>
<input id="phone" placeholder="Phone" value="9999999999" style="padding:8px;margin:5px;display:block;width:200px;">
<input id="pass" placeholder="Password" value="admin123" style="padding:8px;margin:5px;display:block;width:200px;">
<button onclick="test()" style="padding:10px 20px;margin:5px;cursor:pointer;">Test Login</button>
<pre id="out" style="margin-top:20px;white-space:pre-wrap;"></pre>
<script>
var URL = 'https://nsdnjwtiomrtieyqmxrp.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zZG5qd3Rpb21ydGlleXFteHJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4Nzg3NTgsImV4cCI6MjA5MjQ1NDc1OH0.Bl1YgT0ZmqZbOiOiZ7r3_mNSElKvY2gfMBTCZzXnzcE';

function log(msg){ document.getElementById('out').textContent += msg + '\n'; }

function test(){
  var phone = document.getElementById('phone').value;
  var pass = document.getElementById('pass').value;
  document.getElementById('out').textContent = '';
  log('Testing: ' + phone + ' / ' + pass);
  
  var fetchUrl = URL+'/rest/v1/users?phone=eq.'+encodeURIComponent(phone)+'&pass=eq.'+encodeURIComponent(pass)+'&select=*';
  log('URL: ' + fetchUrl);
  
  fetch(fetchUrl, {
    headers: {
      'apikey': KEY,
      'Authorization': 'Bearer ' + KEY
    }
  })
  .then(function(r){ 
    log('Status: ' + r.status);
    return r.text(); 
  })
  .then(function(t){ 
    log('Response: ' + t);
  })
  .catch(function(e){ 
    log('ERROR: ' + e); 
  });
}
</script>
</body>
</html>
